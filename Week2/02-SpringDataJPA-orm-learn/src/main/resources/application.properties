# ===== H2 in-memory database (no install required) =====
spring.datasource.url=jdbc:h2:mem:ormlearn;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql AFTER Hibernate creates the schema
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ===== H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:ormlearn) =====
spring.h2.console.enabled=true

# Log level to see the demo output clearly
logging.level.com.cognizant.ormlearn=INFO
