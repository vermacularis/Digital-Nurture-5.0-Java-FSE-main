# The hands-on samples use a custom port (e.g. 8083). Adjust if the port is busy.
server.port=8083

# Logging (Hands-on: include logging in the app)
logging.level.com.cognizant.springlearn=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Static credentials for the JWT authentication demo (in-memory user)
app.jwt.username=user
app.jwt.password=pwd123
# Base64-encoded 256-bit secret used to sign tokens (demo only - do not reuse in production)
app.jwt.secret=bXktc3VwZXItc2VjcmV0LWtleS1mb3ItZG4tNS0wLWp3dC1kZW1vLTEyMzQ1Ng==
app.jwt.expiration-ms=900000
